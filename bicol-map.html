  .results .row .nm{font-size:13.5px;font-weight:600;}

  .pad{padding:18px;}

<script>
(function(){
  "use strict";
  var DATA = JSON.parse(document.getElementById('bicol-data').textContent);
  var COLORS = { none:'#E0822F', eo:'#4C9A52', eolprap:'#2D6CB2' };
  var KEY = 'bicol_status_overrides_v1';
  var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvhvuH6zuKcrCmN79n5eRWgxhCDowyMYpmy76QdrMJiTfrQfPW9Up8zgf0Qv4u_EZfmvcca7wYoVE4/pub?output=csv';

  var state = { selectedId:null, search:'', editMode:false, overrides:{}, live:null, liveStatus:'loading', liveAt:0 };
  try { var raw = localStorage.getItem(KEY); if(raw) state.overrides = JSON.parse(raw) || {}; } catch(e){}

  // ---- name matching for live CSV ----
  var geoIdx = {};
  DATA.munis.forEach(function(m){ (geoIdx[m.prov] = geoIdx[m.prov] || {})[normName(m.name)] = m.id; });
  function normName(s){ return (s||'').toLowerCase().trim().replace(/^city of\s+/,'').replace(/\s+city$/,'').replace(/\bsta\.?\b/,'santa').replace(/\bsto\.?\b/,'santo').replace(/[.\-]/g,' ').replace(/corpuz/,'corpus').replace(/\s+/g,' ').trim(); }
  function provKey(s){ var t=(s||'').toLowerCase().replace(/[^a-z]/g,'');
    if(t.indexOf('sorsogon')>=0) return 'Sorsogon';
    if(t.indexOf('albay')>=0) return 'Albay';
    if(t.indexOf('catanduanes')>=0) return 'Catanduanes';
    if(t.indexOf('masbate')>=0) return 'Masbate';
    if(t.indexOf('norte')>=0) return 'CamNorte';
    if(t.indexOf('sur')>=0) return 'CamSur';
    return null; }
  function cleanNum(v){ if(v==null) return ''; return String(v).trim().replace(/\.0+$/,''); }

  // ---- CSV ----
  function splitCSV(text){
    var rows=[], row=[], cell='', q=false;
    for(var i=0;i<text.length;i++){ var c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){ cell+='"'; i++; } else q=false; } else cell+=c; }
      else { if(c==='"') q=true; else if(c===','){ row.push(cell); cell=''; } else if(c==='\n'){ row.push(cell); cell=''; rows.push(row); row=[]; } else if(c!=='\r'){ cell+=c; } } }
    if(cell!=='' || row.length){ row.push(cell); rows.push(row); }
    return rows;
  }
  function parseCSV(text){
    var rows = splitCSV(text);
    if(rows.length < 2) return {};
    var head = rows[0].map(function(h){ return (h||'').trim().toUpperCase(); });
    function find(){ for(var i=0;i<head.length;i++) for(var k=0;k<arguments.length;k++) if(head[i].indexOf(arguments[k])>=0) return i; return -1; }
    var iProv=find('PROVINCE'), iName=find('CITY','MUNICIPAL'), iDist=find('DISTRICT'),
        iIss=find('EO ISSUANCE','ISSUANCE'), iNo=find('EO NO','EO NUMBER'),
        iGovt=find('GOVT','GOVERNMENT'), iCso=find('CSO'), iLink=find('EO LINK','LINK'),
        iRem=find('REMARK'), iLp=find('CONDUCTED','LPRAP WORKSHOP','LPRAP'),
        iPhotos=find('PHOTO'), iOut=find('OUTPUT');
    if(iName<0 || iProv<0) return {};
    function cv(row,i){ return (i>=0 && row[i]!=null) ? String(row[i]).trim() : ''; }
    var out={};
    for(var r=1;r<rows.length;r++){
      var row=rows[r]; var nameRaw=cv(row,iName); if(!nameRaw) continue;
      var pk=provKey(cv(row,iProv)); if(!pk) continue;
      var idx=geoIdx[pk]; if(!idx) continue;
      var nn=normName(nameRaw);
      var id=idx[nn];
      if(!id){ var key=Object.keys(idx).find(function(k){ return k.indexOf(nn)>=0 || nn.indexOf(k)>=0; }); if(key) id=idx[key]; }
      if(!id) continue;
      var iss=cv(row,iIss), link=cv(row,iLink), lp=cv(row,iLp);
      var hasEO = /signed|draft|yes|submitted|approved|issued/i.test(iss) || /^https?:/i.test(link);
      var eo = !hasEO ? 'none' : (/draft/i.test(iss) ? 'draft' : 'signed');
      out[id]={ eo:eo, lprap: !!lp, lprapDate: lp, eoLink:link, eoNo:cleanNum(cv(row,iNo)), govt:cleanNum(cv(row,iGovt)), cso:cleanNum(cv(row,iCso)), remarks:cv(row,iRem), district:cv(row,iDist), photos:cv(row,iPhotos), outputs:cv(row,iOut) };
    }
    return out;
  }
  function fetchLive(){
    if(!CSV_URL){ state.liveStatus='snapshot'; renderAll(); return; }
    state.liveStatus='loading'; renderSrc();
    fetch(CSV_URL, { cache:'no-store' }).then(function(res){
      if(!res.ok) throw new Error('http '+res.status);
      return res.text();
    }).then(function(text){
      var live = parseCSV(text);
      if(Object.keys(live).length === 0) throw new Error('no rows');
      state.live = live; state.liveStatus='ok'; state.liveAt=Date.now();
      renderAll();
    }).catch(function(){ state.liveStatus='fail'; renderAll(); });
  }

  // ---- effective status (baked -> live -> local override) ----
  function effective(m){
    var L = (state.live && state.live[m.id]) || null;
    var ov = state.overrides[m.id] || {};
    var bakedEo = m.status==='none' ? 'none' : (m.isDraft ? 'draft' : 'signed');
    var eo = ov.eo !== undefined ? ov.eo : (L && L.eo !== undefined ? L.eo : bakedEo);
    var lprap = ov.lprap !== undefined ? ov.lprap : (L && L.lprap !== undefined ? L.lprap : (m.status==='eolprap'));
    var hasEO = eo !== 'none';
    var status = !hasEO ? 'none' : (lprap ? 'eolprap' : 'eo');
    return {
      eo:eo, lprap:lprap, hasEO:hasEO, status:status,
      eoLink: ov.eoLink !== undefined ? ov.eoLink : (L && L.eoLink ? L.eoLink : m.eoLink),
      eoNo: ov.eoNo !== undefined ? ov.eoNo : (L && L.eoNo ? L.eoNo : m.eoNo),
      govt: (L && L.govt) ? L.govt : m.govt,
      cso: (L && L.cso) ? L.cso : m.cso,
      remarks: (L && L.remarks) ? L.remarks : m.remarks,
      district: (L && L.district) ? L.district : m.district,
      lprapDate: (L && L.lprapDate) ? L.lprapDate : '',
      photos: (L && L.photos) ? L.photos : '',
      outputs: (L && L.outputs) ? L.outputs : ''
    };
  }
  function statusLabel(eo, status){
    if(status==='none') return 'No EO submitted';
    if(status==='eolprap') return 'EO + LPRAP workshop done';
    return eo==='draft' ? 'Draft EO submitted' : 'EO submitted';
  }
  function saveOv(){ try { localStorage.setItem(KEY, JSON.stringify(state.overrides)); } catch(e){} }
  function setOv(id, patch){ var o = state.overrides[id] || (state.overrides[id]={}); for(var k in patch) o[k]=patch[k]; saveOv(); renderAll(); }

  // ---- helpers ----
  function el(tag, attrs, kids){ var n=document.createElementNS(tag==='svg'||tag==='path'||tag==='text'||tag==='rect'||tag==='g'?'http://www.w3.org/2000/svg':null, tag);
    // fallback for html
    if(!n.namespaceURI || (tag!=='svg'&&tag!=='path'&&tag!=='text'&&tag!=='rect'&&tag!=='g')) n=document.createElement(tag);
    if(attrs) for(var k in attrs){ if(k==='text') n.textContent=attrs[k]; else if(k==='html') n.innerHTML=attrs[k]; else n.setAttribute(k, attrs[k]); }
    if(kids) kids.forEach(function(c){ if(c) n.appendChild(c); });
    return n;
  }
  function svgEl(tag, attrs){ var n=document.createElementNS('http://www.w3.org/2000/svg', tag); if(attrs) for(var k in attrs) n.setAttribute(k, attrs[k]); return n; }
  function fmtTime(t){ if(!t) return ''; try { return new Date(t).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } }

  // ---- build SVG map once ----
  var svg = document.getElementById('map');
  svg.setAttribute('viewBox', '0 0 '+DATA.W+' '+DATA.H);
  var pathEls = {};
  var sea = svgEl('rect', {x:-50,y:-50,width:2000,height:2000,fill:'transparent'});
  sea.addEventListener('click', function(){ select(null); });
  svg.appendChild(sea);
  DATA.munis.forEach(function(m){
    var p = svgEl('path', { d:m.d, 'class':'muni', stroke:'#ffffff', 'stroke-width':'0.7', 'stroke-linejoin':'round' });
    p.addEventListener('click', function(e){ e.stopPropagation(); select(m.id); });
    p.addEventListener('pointerenter', function(e){ showTip(m, e); });
    p.addEventListener('pointermove', moveTip);
    p.addEventListener('pointerleave', hideTip);
    svg.appendChild(p); pathEls[m.id]=p;
  });
  // province outlines
  Object.keys(DATA.provOutlines).forEach(function(k){
    svg.appendChild(svgEl('path', { d:DATA.provOutlines[k], fill:'none', stroke:'#2A2620', 'stroke-width':'2.2', 'stroke-linejoin':'round', 'stroke-linecap':'round', opacity:'0.9', 'pointer-events':'none' }));
  });
  // province labels (halo + fill)
  Object.keys(DATA.provPos).forEach(function(k){
    var p=DATA.provPos[k];
    var halo=svgEl('text',{x:p.cx,y:p.cy,'text-anchor':'middle','class':'plabel-halo','font-size':'18'}); halo.textContent=p.name;
    var fill=svgEl('text',{x:p.cx,y:p.cy,'text-anchor':'middle','class':'plabel','font-size':'18'}); fill.textContent=p.name;
    svg.appendChild(halo); svg.appendChild(fill);
  });

  // ---- tooltip ----
  var tip=document.getElementById('tip'), tipN=tip.querySelector('.tn'), tipS=tip.querySelector('.ts');
  function showTip(m, e){ var ef=effective(m); tipN.textContent=m.name; tipS.textContent=statusLabel(ef.eo, ef.status); tipS.style.color=COLORS[ef.status]; tip.style.display='block'; moveTip(e); }
  function moveTip(e){ if(tip.style.display==='none') return; var x=e.clientX+14, y=e.clientY+16; if(x+220>window.innerWidth) x=e.clientX-14-tip.offsetWidth; tip.style.left=x+'px'; tip.style.top=y+'px'; }
  function hideTip(){ tip.style.display='none'; }

  // ---- paint map colors ----
  function paintMap(){
    var q = state.search.trim().toLowerCase();
    DATA.munis.forEach(function(m){
      var ef=effective(m), p=pathEls[m.id];
      p.setAttribute('fill', COLORS[ef.status]);
      var isSel = m.id===state.selectedId;
      p.setAttribute('stroke', isSel ? '#15120E' : '#ffffff');
      p.setAttribute('stroke-width', isSel ? '2.4' : '0.7');
      var match = q && m.name.toLowerCase().indexOf(q)>=0;
      p.setAttribute('opacity', (q && !match) ? '0.28' : '1');
    });
  }

  // ---- chips + legend counts ----
  function counts(){ var c={none:0,eo:0,eolprap:0}; DATA.munis.forEach(function(m){ c[effective(m).status]++; }); return c; }
  function renderChips(){
    var c=counts(), box=document.getElementById('chips'); box.innerHTML='';
    [['eo','EO'],['eolprap','EO + LPRAP'],['none','No EO']].forEach(function(x){
      box.appendChild(el('div',{'class':'chip'},[ el('span',{'class':'dot'}), el('span',{'class':'n',text:String(c[x[0]])}), el('span',{'class':'lbl',text:x[1]}) ]));
      box.lastChild.querySelector('.dot').style.background=COLORS[x[0]];
    });
  }

  // ---- source bar ----
  function renderSrc(){
    var map={ ok:{l:'Live from Google Sheet',c:'#4C9A52',s:'Synced '+fmtTime(state.liveAt)},
      loading:{l:'Syncing Google Sheet…',c:'#C99A3A',s:'Showing snapshot meanwhile'},
      fail:{l:'Showing saved snapshot',c:'#C0622E',s:'Live sheet not reachable — tap Refresh'},
      snapshot:{l:'Saved snapshot',c:'#9a9183',s:'Built-in data'} };
    var s=map[state.liveStatus]||map.snapshot;
    document.getElementById('sdot').style.background=s.c;
    document.getElementById('slabel').textContent=s.l;
    document.getElementById('ssub').textContent=s.s;
  }

  // ---- detail / legend ----
  function renderDetail(){
    var box=document.getElementById('detail'); box.innerHTML='';
    if(state.selectedId){ box.appendChild(buildDetail()); }
    else { box.appendChild(buildLegend()); }
  }
  function buildLegend(){
    var c=counts();
    var wrap=el('div',{'class':'pad legend'});
    wrap.appendChild(el('div',{'class':'lt',text:'Legend'}));
    [['eo','EO submitted','Executive Order on file'],['eolprap','EO + LPRAP','EO filed & workshop done'],['none','No EO yet','Awaiting submission']].forEach(function(x){
      var li=el('div',{'class':'li'},[ el('span',{'class':'sw'}), el('div',{},[ el('div',{'class':'nm',text:x[1]}), el('div',{'class':'ds',text:x[2]}) ]), el('div',{'class':'n',text:String(c[x[0]])}) ]);
      li.querySelector('.sw').style.background=COLORS[x[0]];
      li.querySelector('.n').style.color=COLORS[x[0]];
      wrap.appendChild(li);
    });
    var how=el('div',{'class':'howto'});
    how.appendChild(el('h3',{text:'How to use'}));
    how.appendChild(el('p',{html:'Tap any city or municipality to see its EO status and open the EO document. Turn on <b>Edit mode</b> (bottom-left) to record a new EO submission or a completed LPRAP workshop — the color updates instantly. Edits are saved on your device.'}));
    wrap.appendChild(how);
    return wrap;
  }
  function buildDetail(){
    var m=DATA.munis.filter(function(x){return x.id===state.selectedId;})[0];
    var e=effective(m);
    var wrap=el('div',{'class':'pad'});
    var head=el('div',{'class':'selhead'});
    var left=el('div',{style:'min-width:0;'});
    left.appendChild(el('div',{'class':'eyebrow',text: DATA.provLabel[m.prov] + (e.district ? ' · '+e.district+' district' : '')}));
    left.appendChild(el('h2',{text:m.name}));
    head.appendChild(left);
    var x=el('button',{'class':'xbtn',text:'×'}); x.addEventListener('click',function(){select(null);}); head.appendChild(x);
    wrap.appendChild(head);

    var pill=el('div',{'class':'statuspill'},[ el('span',{'class':'d'}), el('span',{'class':'t',text:statusLabel(e.eo,e.status)}) ]);
    pill.style.background = e.status==='none'?'#FBEFE2':(e.status==='eolprap'?'#E6EFF7':'#E9F2EA');
    pill.querySelector('.d').style.background=COLORS[e.status];
    pill.querySelector('.t').style.color=COLORS[e.status];
    wrap.appendChild(pill);

    var eoIssLabel = e.eo==='none'?'—':(e.eo==='draft'?'Draft EO':'Signed EO');
    var facts=el('div',{'class':'facts'});
    [['EO status',eoIssLabel,"'Public Sans'"],['EO number',(e.eoNo&&e.eo!=='none')?e.eoNo:'—',"'IBM Plex Mono'"],['Govt reps',e.govt||'—',"'IBM Plex Mono'"],['CSO reps',e.cso||'—',"'IBM Plex Mono'"]].forEach(function(f){
      var fe=el('div',{'class':'f'},[ el('div',{'class':'k',text:f[0]}), el('div',{'class':'v',text:f[1]}) ]);
      fe.querySelector('.v').style.fontFamily=f[2];
      facts.appendChild(fe);
    });
    wrap.appendChild(facts);

    if(e.remarks){
      wrap.appendChild(el('div',{'class':'remarks'},[ el('div',{'class':'k',text:'Remarks'}), el('div',{'class':'v',text:e.remarks}) ]));
    }
    var isUrl=function(s){ return /^https?:\/\//i.test((s||'').trim()); };
    if(isUrl(e.eoLink)){
      var a=el('a',{'class':'eobtn',href:e.eoLink,target:'_blank',rel:'noopener'},[ el('span',{text:'Open EO document'}), el('span',{text:'↗',style:'font-size:15px;'}) ]);
      wrap.appendChild(a);
    } else if(e.eoLink){
      wrap.appendChild(el('div',{'class':'nolink',text:'EO on file: '+e.eoLink}));
    } else {
      wrap.appendChild(el('div',{'class':'nolink',text:'No EO document link on file'}));
    }

    // ---- LPRAP workshop section ----
    if(e.lprap || e.lprapDate || isUrl(e.photos) || isUrl(e.outputs)){
      var ws=el('div',{'class':'wsbox'});
      ws.appendChild(el('div',{'class':'wst',text:'LPRAP workshop'}));
      if(e.lprapDate){ ws.appendChild(el('div',{'class':'wsdate',text:'Conducted '+e.lprapDate})); }
      var links=el('div',{'class':'wslinks'});
      if(isUrl(e.photos)){ links.appendChild(el('a',{'class':'wsbtn',href:e.photos,target:'_blank',rel:'noopener'},[ el('span',{text:'📷'}), el('span',{text:'Workshop photos'}), el('span',{'class':'arr',text:'↗'}) ])); }
      if(isUrl(e.outputs)){ links.appendChild(el('a',{'class':'wsbtn',href:e.outputs,target:'_blank',rel:'noopener'},[ el('span',{text:'📄'}), el('span',{text:'Workshop outputs'}), el('span',{'class':'arr',text:'↗'}) ])); }
      if(links.children.length) ws.appendChild(links);
      if((e.lprap||e.lprapDate) && !links.children.length){ ws.appendChild(el('div',{'class':'nolink',style:'margin-top:8px;',text:'No photo or output links yet'})); }
      wrap.appendChild(ws);
    }

    if(state.editMode){ wrap.appendChild(buildEdit(m,e)); }
    return wrap;
  }
  function buildEdit(m,e){
    var box=el('div',{'class':'editbox'});
    box.appendChild(el('div',{'class':'et',text:'Update status'}));
    box.appendChild(el('div',{'class':'elab',text:'EO submission'}));
    var eoRow=el('div',{'class':'segrow'});
    [['none','No EO'],['draft','Draft'],['signed','Signed EO']].forEach(function(b){
      var btn=el('button',{text:b[1]});
      if(e.eo===b[0]){ btn.style.background='#1E1B17'; btn.style.color='#fff'; btn.style.borderColor='#1E1B17'; }
      btn.addEventListener('click',function(){ setOv(m.id,{eo:b[0]}); });
      eoRow.appendChild(btn);
    });
    box.appendChild(eoRow);

    box.appendChild(el('div',{'class':'elab',text:'LPRAP workshop'}));
    var lpRow=el('div',{'class':'segrow'});
    [[false,'Not yet'],[true,'Conducted']].forEach(function(b){
      var btn=el('button',{text:b[1]});
      if(e.lprap===b[0]){ var bg=b[0]?COLORS.eolprap:'#1E1B17'; btn.style.background=bg; btn.style.color='#fff'; btn.style.borderColor=bg; }
      btn.addEventListener('click',function(){ setOv(m.id,{lprap:b[0]}); });
      lpRow.appendChild(btn);
    });
    box.appendChild(lpRow);

    box.appendChild(el('div',{'class':'elab',text:'EO number'}));
    var noIn=el('input',{value:e.eoNo||'',placeholder:'e.g. 2025-07'});
    noIn.addEventListener('input',function(){ state.overrides[m.id]=state.overrides[m.id]||{}; state.overrides[m.id].eoNo=noIn.value; saveOv(); });
    box.appendChild(noIn);

    box.appendChild(el('div',{'class':'elab',text:'EO document link'}));
    var lkIn=el('input',{value:e.eoLink||'',placeholder:'Paste Google Drive / Docs link…'});
    lkIn.addEventListener('input',function(){ state.overrides[m.id]=state.overrides[m.id]||{}; state.overrides[m.id].eoLink=lkIn.value; saveOv(); });
    box.appendChild(lkIn);

    var foot=el('div',{'class':'editfoot'},[ el('span',{text:'Saved on this device'}), el('button',{text:'Reset to original'}) ]);
    foot.querySelector('button').addEventListener('click',function(){ delete state.overrides[m.id]; saveOv(); renderAll(); });
    box.appendChild(foot);
    return box;
  }

  // ---- search ----
  var searchInput=document.getElementById('search'), resultsBox=document.getElementById('results');
  searchInput.addEventListener('input',function(){ state.search=searchInput.value; renderResults(); paintMap(); });
  function renderResults(){
    var q=state.search.trim().toLowerCase();
    if(!q){ resultsBox.style.display='none'; resultsBox.innerHTML=''; return; }
    var list=DATA.munis.filter(function(m){return m.name.toLowerCase().indexOf(q)>=0;}).slice(0,14);
    if(!list.length){ resultsBox.style.display='none'; return; }
    resultsBox.innerHTML=''; resultsBox.style.display='block';
    list.forEach(function(m){
      var ef=effective(m);
      var row=el('div',{'class':'row'},[ el('span',{'class':'d'}), el('span',{'class':'nm',text:m.name}), el('span',{'class':'pv',text:DATA.provLabel[m.prov]}) ]);
      row.querySelector('.d').style.background=COLORS[ef.status];
      row.addEventListener('click',function(){ select(m.id); searchInput.value=''; state.search=''; renderResults(); paintMap(); });
      resultsBox.appendChild(row);
    });
  }

  // ---- selection ----
  function select(id){ state.selectedId=id; paintMap(); renderDetail(); }

  // ---- edit toggle ----
  var editToggle=document.getElementById('editToggle'), editLabel=document.getElementById('editLabel');
  editToggle.addEventListener('click',function(){
    state.editMode=!state.editMode;
    editLabel.textContent = state.editMode ? 'Edit mode: ON' : 'Edit mode: OFF';
    if(state.editMode){ editToggle.style.background='#214a2a'; editToggle.style.color='#fff'; editToggle.style.borderColor='#214a2a'; editToggle.querySelector('.d').style.background='#fff'; }
    else { editToggle.style.background='#fff'; editToggle.style.color='#6B655C'; editToggle.style.borderColor='#D9D3C7'; editToggle.querySelector('.d').style.background='#6B655C'; }
    renderDetail();
  });

  // ---- export / import / reset ----
  document.getElementById('exportBtn').addEventListener('click',function(){
    var payload={app:'bicol-eo-lprap',version:1,savedAt:new Date().toISOString(),overrides:state.overrides};
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='bicol-status-updates.json';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  });
  var fileInput=document.getElementById('fileInput');
  document.getElementById('importBtn').addEventListener('click',function(){ fileInput.click(); });
  fileInput.addEventListener('change',function(e){
    var file=e.target.files&&e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(){ try { var j=JSON.parse(r.result); var ov=j.overrides||j; if(ov&&typeof ov==='object'){ state.overrides=ov; saveOv(); renderAll(); } } catch(err){ alert('Could not read that file — make sure it is an exported updates file.'); } };
    r.readAsText(file); e.target.value='';
  });
  document.getElementById('resetBtn').addEventListener('click',function(){
    if(confirm('Reset every municipality back to the original sheet data? This clears all edits saved on this device.')){ state.overrides={}; saveOv(); renderAll(); }
  });
  document.getElementById('refreshBtn').addEventListener('click',fetchLive);

  // ---- render all ----
  function renderAll(){ renderChips(); renderSrc(); paintMap(); renderDetail(); renderResults(); }

  renderAll();
  fetchLive();
})();

</script>
</body>
</html>
